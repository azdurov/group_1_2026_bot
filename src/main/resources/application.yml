server:
  port: ${PORT:8080}

spring:
  application:
    name: group-1-bot

  task:
    scheduling:
      pool:
        size: 2
      thread-name-prefix: bot-scheduler-

scheduler:
  enabled: true
  timezone: Europe/Minsk

  morning-weather:
    cron: ${SCHEDULER_MORNING_WEATHER_CRON:0 0 4 * * *}

  wish:
    cron: ${SCHEDULER_WISH_CRON:0 0 5 * * *}

  holiday:
    cron: ${SCHEDULER_HOLIDAY_CRON:0 0 6 * * *}

  quote:
    cron: ${SCHEDULER_QUOTE_CRON:0 0 7 * * *}

  joke:
    cron: ${SCHEDULER_JOKE_CRON:0 0 9 * * *}

  recipe:
    cron: ${SCHEDULER_RECIPE_CRON:0 0 14 * * *}

  evening-weather:
    cron: ${SCHEDULER_EVENING_WEATHER_CRON:0 0 15 * * *}

  reminder:
    enabled: ${SCHEDULER_REMINDER_ENABLED:true}
    cron: ${SCHEDULER_REMINDER_CRON:0 0 19 * * *}


telegram:
  bot:
    token: ${BOT_TOKEN}
    chat-id: ${CHAT_ID}
    username: ${BOT_USERNAME:@group_1_2026_bot}

  long-polling:
    enabled: true

weather:
  location:
    latitude: 53.6712799
    longitude: 23.8659896

  open-weather:
    api-key: ${OPEN_WEATHER_API_KEY}
    api-url: https://api.openweathermap.org/data/2.5/forecast

  yandex:
    api-key: ${YANDEX_API_KEY}
    api-url: https://api.weather.yandex.ru/v2/forecast

  gismeteo:
    api-key: ${GISMETEO_API_KEY}
    api-url: https://api.gismeteo.net/v3/weather/forecast/h3


meme:
  api-url: https://meme-api.com/gimme


statham:
  url: https://stathamcitaty.ru/get_random_quote.php


joke:
  api-url: http://rzhunemogu.ru/RandJSON.aspx
  category: 1


holiday:
  api:
    url: https://date.nager.at/api/v3/PublicHolidays


recipe:
  api:
    url: https://www.themealdb.com/api/json/v1/1/random.php


reminder:
  message: ${REMINDER_MESSAGE:Котики, отправляем скриншот пройденных шагов.}


http:
  client:
    connect-timeout: 5s
    read-timeout: 10s


logging:
  level:
    root: INFO
    group2026: DEBUG
    org.telegram: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
