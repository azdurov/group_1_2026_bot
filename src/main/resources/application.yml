server:
  port: ${PORT:8080}

spring:
  application:
    name: group-1-bot

  task:
    scheduling:
      pool:
        size: 2
      thread-name-prefix: bot-scheduler-

scheduler:
  enabled: true
  timezone: Europe/Minsk

  morning-weather:
    cron: ${SCHEDULER_MORNING_WEATHER_CRON:0 0 7 * * *}

  wish:
    cron: ${SCHEDULER_WISH_CRON:0 0 8 * * *}

  holiday:
    cron: ${SCHEDULER_HOLIDAY_CRON:0 0 9 * * *}

  quote:
    cron: ${SCHEDULER_QUOTE_CRON:0 0 10 * * *}

  joke:
    cron: ${SCHEDULER_JOKE_CRON:0 0 12 * * *}

  recipe:
    cron: ${SCHEDULER_RECIPE_CRON:0 0 17 * * *}

  evening-weather:
    cron: ${SCHEDULER_EVENING_WEATHER_CRON:0 0 18 * * *}

telegram:
  bot:
    token: ${BOT_TOKEN}
    chat-id: ${CHAT_ID}

  long-polling:
    enabled: true

weather:
  location:
    latitude: 53.669353
    longitude: 23.813131

  open-weather:
    api-key: ${OPEN_WEATHER_API_KEY}
    api-url: https://api.openweathermap.org/data/2.5/forecast

  yandex:
    api-key: ${YANDEX_API_KEY}
    api-url: https://api.weather.yandex.ru/v2/forecast

  gismeteo:
    api-key: ${GISMETEO_API_KEY}
    api-url: https://api.gismeteo.net/v3/weather/forecast/h3


meme:
  api-url: https://meme-api.com/gimme


quote:
  api:
    url: https://api.api-ninjas.com/v1/quotes?category=funny
    key: ${QUOTE_API_KEY:QQQ}


joke:
  api-url: http://rzhunemogu.ru/RandJSON.aspx
  category: 1


holiday:
  api:
    url: https://date.nager.at/api/v3/PublicHolidays


recipe:
  api:
    url: https://www.themealdb.com/api/json/v1/1/random.php


http:
  client:
    connect-timeout: 5s
    read-timeout: 10s


logging:
  level:
    root: INFO
    group2026: DEBUG
    org.telegram: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
